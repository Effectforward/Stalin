name: Build and Release

on:
  push:
    tags:
      - 'v*'               # Triggers only on version tags, e.g., v1.0.0
  workflow_dispatch:        # Allows manual run from the Actions tab

jobs:
  # ── Build matrix for all three platforms ─────────────────
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: stalin-linux
            binary_name: stalin
          - os: windows-latest
            artifact_name: stalin-windows
            binary_name: stalin.exe
          - os: macos-latest
            artifact_name: stalin-macos
            binary_name: stalin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir stalin-package
          cp build/bin/${{ matrix.binary_name }} stalin-package/
          cp -r assets stalin-package/
          zip -r ${{ matrix.artifact_name }}.zip stalin-package

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir stalin-package
          copy build\bin\${{ matrix.binary_name }} stalin-package\
          xcopy assets stalin-package\assets\ /E /I
          Compress-Archive -Path stalin-package\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  # ── Create the GitHub Release and attach all artifacts ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}