name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: stalin-linux
            binary_name: stalin
          - os: windows-latest
            artifact_name: stalin-windows
            binary_name: stalin.exe
          - os: macos-latest
            artifact_name: stalin-macos
            binary_name: stalin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          for i in {1..3}; do
            sudo apt-get install -y --no-install-recommends \
              libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev \
              libxi-dev libxext-dev libxfixes-dev libwayland-dev \
              libxkbcommon-dev libgl1-mesa-dev && break || sleep 10
          done

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Clean build directory
        run: rm -rf build
        shell: bash

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "Ninja"

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir stalin-package
          cp build/bin/${{ matrix.binary_name }} stalin-package/
          cp -r assets stalin-package/
          zip -r ${{ matrix.artifact_name }}.zip stalin-package

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir stalin-package
          copy build\bin\${{ matrix.binary_name }} stalin-package\
          xcopy assets stalin-package\assets\ /E /I
          Compress-Archive -Path stalin-package\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

 release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}